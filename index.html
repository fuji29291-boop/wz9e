  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #05050a;
      --surface: rgba(255,255,255,0.030);
      --surface-hover: rgba(255,255,255,0.055);
      --border: rgba(255,255,255,0.07);
      --border-hover: rgba(255,255,255,0.15);
      --gold: #c9a96e;
      --gold2: #e8d5a3;
      --text: #f5f0e8;
      --muted: rgba(245,240,232,0.4);
      --dim: rgba(245,240,232,0.18);
      --spotify: #1DB954;
      --radius: 18px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      color: var(--text);
      padding: 3rem 1.2rem;
      overflow-x: hidden;
      cursor: none;
    }

    /* ── Custom Cursor ── */
    #cursor {
      position: fixed;
      width: 8px; height: 8px;
      background: var(--gold);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9999;
      transform: translate(-50%,-50%);
      mix-blend-mode: screen;
      transition: width 0.2s, height 0.2s;
    }

    #cursor-ring {
      position: fixed;
      width: 36px; height: 36px;
      border: 1px solid rgba(201,169,110,0.45);
      border-radius: 50%;
      pointer-events: none;
      z-index: 9998;
      transform: translate(-50%,-50%);
      transition: width 0.25s, height 0.25s, border-color 0.2s;
    }

    /* ── Rain Canvas ── */
    #rain {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      opacity: 0.3;
    }

    /* ── Noise grain ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.022;
      pointer-events: none;
      z-index: 1;
    }

    /* ── Vignette ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.72) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .wrap {
      width: 100%;
      max-width: 400px;
      position: relative;
      z-index: 2;
    }

    /* ── Entrance animations ── */
    .reveal {
      opacity: 0;
      transform: translateY(18px);
      animation: up 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes up { to { opacity:1; transform:none; } }
    .reveal:nth-child(1){animation-delay:.08s}
    .reveal:nth-child(2){animation-delay:.16s}
    .reveal:nth-child(3){animation-delay:.24s}
    .reveal:nth-child(4){animation-delay:.32s}
    .reveal:nth-child(5){animation-delay:.40s}
    .reveal:nth-child(6){animation-delay:.48s}
    .reveal:nth-child(7){animation-delay:.56s}
    .reveal:nth-child(8){animation-delay:.64s}

    /* ── Avatar ── */
    .avatar-section {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 2rem;
    }

    .avatar-outer {
      position: relative;
      width: 96px; height: 96px;
      margin-bottom: 1.1rem;
    }

    .avatar-outer::before {
      content: '';
      position: absolute; inset: -3px;
      border-radius: 50%;
      background: conic-gradient(var(--gold) 0deg, transparent 90deg, var(--gold2) 180deg, transparent 270deg, var(--gold) 360deg);
      animation: spinRing 6s linear infinite;
      z-index: 0;
    }

    @keyframes spinRing { to { transform: rotate(360deg); } }

    .avatar-outer::after {
      content: ''; position: absolute; inset: 0;
      border-radius: 50%; background: var(--bg); z-index: 1;
    }

    .avatar-outer img, .avatar-fallback {
      position: absolute; inset: 4px;
      width: calc(100% - 8px); height: calc(100% - 8px);
      border-radius: 50%; object-fit: cover; z-index: 2;
    }

    .avatar-fallback {
      background: #111; display: flex;
      align-items: center; justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 32px; color: var(--gold);
    }

    .status-pip {
      position: absolute; bottom: 5px; right: 5px;
      width: 15px; height: 15px;
      border-radius: 50%; background: #80848E;
      border: 2.5px solid var(--bg);
      z-index: 3; transition: background 0.4s;
    }

    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 40px; font-weight: 400;
      letter-spacing: 0.14em; text-transform: uppercase;
      line-height: 1; margin-bottom: 0.5rem;
    }

    .tagline {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.22em;
      text-transform: uppercase; color: var(--gold);
      opacity: 0.65; margin-bottom: 0.4rem;
    }

    .status-text {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--muted);
      letter-spacing: 0.08em; transition: color 0.4s;
    }

    /* ── Visitor Bar ── */
    .visitor-bar {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 1.4rem;
      padding: 7px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 99px;
      width: fit-content;
      margin-left: auto; margin-right: auto;
    }

    .visitor-dot {
      width: 6px; height: 6px;
      border-radius: 50%; background: var(--gold);
      animation: blink 2s ease-in-out infinite;
    }

    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.65); }
    }

    .visitor-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px; letter-spacing: 0.12em; color: var(--muted);
    }

    .visitor-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px; color: var(--gold); font-weight: 500;
    }

    /* ── Divider ── */
    .divider {
      display: flex; align-items: center; gap: 12px;
      margin-bottom: 1rem;
    }
    .divider-line {
      flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, var(--border), transparent);
    }
    .divider-diamond {
      width: 5px; height: 5px;
      background: var(--gold); transform: rotate(45deg); opacity: 0.45;
    }

    /* ── Cards ── */
    .card {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px;
      text-decoration: none; color: inherit; cursor: none;
      transition: background 0.2s, border-color 0.2s, transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
    }

    /* Gold shimmer sweep */
    .card::after {
      content: '';
      position: absolute; top: -50%; left: -70%;
      width: 40%; height: 200%;
      background: linear-gradient(105deg, transparent, rgba(201,169,110,0.06), transparent);
      transform: skewX(-15deg);
      transition: left 0.55s ease;
    }

    .card:hover::after { left: 130%; }
    .card:hover {
      background: var(--surface-hover);
      border-color: var(--border-hover);
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 1px 0 rgba(255,255,255,0.04) inset;
    }
    .card:active { transform: translateY(0); }

    .icon-box {
      width: 40px; height: 40px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    .card-info { flex: 1; min-width: 0; }

    .card-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px; color: var(--dim);
      letter-spacing: 0.18em; text-transform: uppercase; margin-bottom: 4px;
    }

    .card-value { font-size: 14px; font-weight: 600; letter-spacing: 0.02em; }

    .card-sub {
      font-size: 11.5px; color: var(--muted); margin-top: 3px;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 300;
    }

    .dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; background: #80848E; transition: background 0.4s;
    }

    .dot.online { animation: dotGlow 2.5s ease-in-out infinite; }
    @keyframes dotGlow {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,212,122,0.5); }
      50%      { box-shadow: 0 0 0 5px rgba(34,212,122,0); }
    }

    .chevron { color: var(--dim); font-size: 18px; font-weight: 300; }

    /* ── Music Card ── */
    .music-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 8px; padding: 18px;
      backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      position: relative; overflow: hidden;
    }

    /* Gold top accent */
    .music-card::before {
      content: '';
      position: absolute; top: 0; left: 20%; right: 20%; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.35;
    }

    /* Ambient glow — safe wrapper approach, no overflow conflict */
    .music-glow-wrap { position: relative; margin-bottom: 8px; border-radius: var(--radius); }
    .music-glow-wrap::before {
      content: '';
      position: absolute; inset: -2px;
      border-radius: calc(var(--radius) + 2px);
      background: var(--glow-color, rgba(30,60,120,0));
      filter: blur(18px);
      opacity: 0;
      transition: opacity 1.2s ease, background 1.2s ease;
      z-index: -1;
      pointer-events: none;
    }
    .music-glow-wrap.pulse-glow::before {
      opacity: 1;
      animation: pulseGlow 2.5s ease-in-out infinite;
    }
    @keyframes pulseGlow {
      0%,100% { filter: blur(18px); }
      50%      { filter: blur(32px); }
    }

    /* Spotify bars */
    .sp-bar {
      width: 3px; border-radius: 2px; background: #1DB954;
      animation: spBar 0.9s ease-in-out infinite alternate;
    }
    .sp-bar:nth-child(1){height:8px; animation-delay:0s}
    .sp-bar:nth-child(2){height:14px;animation-delay:.2s}
    .sp-bar:nth-child(3){height:6px; animation-delay:.4s}
    @keyframes spBar {
      from{transform:scaleY(0.3);opacity:0.5}
      to{transform:scaleY(1);opacity:1}
    }

    /* Ripple */
    .ripple {
      position: fixed; border-radius: 50%; pointer-events: none;
      background: rgba(201,169,110,0.25);
      transform: translate(-50%,-50%) scale(0);
      animation: rippleAnim 0.7s ease-out forwards;
      z-index: 9997;
    }
    @keyframes rippleAnim {
      to { transform: translate(-50%,-50%) scale(1); opacity: 0; }
    }

    .music-top {
      display: flex; align-items: center; gap: 14px; margin-bottom: 16px;
    }

    .music-art {
      width: 52px; height: 52px; border-radius: 12px;
      background: #111;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; position: relative; overflow: hidden;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .music-art img.cover-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; border-radius: 12px; z-index: 0;
      transition: opacity 0.3s;
    }

    .music-art::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 55%);
    }

    .vinyl {
      width: 18px; height: 18px; border-radius: 50%;
      background: rgba(0,0,0,0.4);
      border: 3.5px solid rgba(255,255,255,0.4);
      animation: spin 3s linear infinite paused;
      position: relative; z-index: 1;
    }

    .vinyl::after {
      content: ''; position: absolute; inset: 2px;
      border-radius: 50%; background: rgba(0,0,0,0.5);
    }

    .music-art.playing .vinyl { animation-play-state: running; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .music-info { flex: 1; min-width: 0; }

    .music-label {
      font-family: 'DM Mono', monospace; font-size: 9px;
      color: var(--dim); letter-spacing: 0.18em;
      text-transform: uppercase; margin-bottom: 4px;
    }

    .music-title {
      font-size: 15px; font-weight: 700; letter-spacing: 0.01em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .music-artist { font-size: 12px; color: var(--muted); margin-top: 3px; font-weight: 300; }

    /* Progress */
    .progress-wrap { margin-bottom: 14px; cursor: pointer; user-select: none; }

    .progress-track {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.06); border-radius: 99px; position: relative;
    }

    .progress-fill {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      border-radius: 99px;
      transition: width 0.4s linear; position: relative;
    }

    .progress-fill::after {
      content: ''; position: absolute; right: -1px; top: 50%;
      transform: translateY(-50%);
      width: 8px; height: 8px;
      background: var(--gold2); border-radius: 50%;
      opacity: 0; transition: opacity 0.2s;
      box-shadow: 0 0 8px var(--gold);
    }

    .progress-wrap:hover .progress-fill::after { opacity: 1; }

    .time-row { display: flex; justify-content: space-between; margin-top: 6px; }
    .time-row span { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); }

    /* Controls */
    .controls {
      display: flex; align-items: center; justify-content: center;
      gap: 2px; margin-bottom: 14px;
    }

    .ctrl {
      background: none; border: none; color: var(--muted); cursor: none;
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: color 0.15s, background 0.15s;
    }

    .ctrl:hover { color: var(--text); background: rgba(255,255,255,0.05); }

    .ctrl.play {
      width: 52px; height: 52px; border-radius: 50%;
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: #000; margin: 0 8px;
      box-shadow: 0 4px 20px rgba(201,169,110,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .ctrl.play:hover { transform: scale(1.06); box-shadow: 0 6px 28px rgba(201,169,110,0.45); }
    .ctrl.play:active { transform: scale(0.97); }
    .ctrl.active { color: var(--gold); }

    /* Volume */
    .vol-row { display: flex; align-items: center; gap: 10px; }
    .vol-icon { color: var(--dim); flex-shrink: 0; }

    input[type=range] {
      -webkit-appearance: none; appearance: none;
      flex: 1; height: 2px;
      background: rgba(255,255,255,0.06); border-radius: 99px;
      outline: none; cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--gold); cursor: pointer;
      box-shadow: 0 0 6px rgba(201,169,110,0.5);
    }

    input[type=range]::-moz-range-thumb {
      width: 12px; height: 12px; border-radius: 50%;
      background: var(--gold); cursor: pointer; border: none;
    }

    /* Track list */
    .track-list {
      margin-top: 16px; border-top: 1px solid var(--border);
      padding-top: 14px; display: flex; flex-direction: column; gap: 2px;
    }

    .track-item {
      display: flex; align-items: center; gap: 12px;
      padding: 8px 10px; border-radius: 12px; cursor: none;
      transition: background 0.15s;
    }

    .track-item:hover { background: rgba(255,255,255,0.04); }
    .track-item.active { background: rgba(201,169,110,0.08); }

    .track-num {
      font-family: 'DM Mono', monospace; font-size: 11px;
      color: var(--dim); width: 16px; text-align: center; flex-shrink: 0;
    }

    .track-item.active .track-num { color: var(--gold); }
    .track-name { flex: 1; min-width: 0; }

    .track-name-main {
      font-size: 13px; font-weight: 600;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    .track-item.active .track-name-main { color: var(--gold); }
    .track-name-artist { font-size: 11px; color: var(--muted); margin-top: 1px; font-weight: 300; }
    .track-dur { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--dim); }

    /* EQ */
    .eq { display: flex; align-items: flex-end; gap: 2px; height: 14px; }
    .eq span {
      width: 2.5px; border-radius: 1px; background: var(--gold);
      animation: eq 0.7s ease-in-out infinite alternate;
    }
    .eq span:nth-child(1){height:5px;  animation-delay:0s}
    .eq span:nth-child(2){height:11px; animation-delay:.2s}
    .eq span:nth-child(3){height:7px;  animation-delay:.4s}
    @keyframes eq {
      from { transform:scaleY(0.3); opacity:0.5; }
      to   { transform:scaleY(1);   opacity:1; }
    }
    .eq.paused span { animation-play-state: paused; }
  </style>

  <script>
    /* ── Custom Cursor ── */
    const cursor = document.getElementById('cursor');
    const ring   = document.getElementById('cursor-ring');
    let mx=window.innerWidth/2, my=window.innerHeight/2;
    let rx=mx, ry=my;

    document.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });

    (function animCursor(){
      cursor.style.left = mx+'px'; cursor.style.top = my+'px';
      rx += (mx-rx)*0.11; ry += (my-ry)*0.11;
      ring.style.left = rx+'px'; ring.style.top = ry+'px';
      requestAnimationFrame(animCursor);
    })();

    document.querySelectorAll('a,button,.card,.track-item,.progress-wrap').forEach(el => {
      el.addEventListener('mouseenter', ()=>{ cursor.style.width='14px'; cursor.style.height='14px'; ring.style.width='50px'; ring.style.height='50px'; ring.style.borderColor='rgba(201,169,110,0.75)'; });
      el.addEventListener('mouseleave', ()=>{ cursor.style.width='8px';  cursor.style.height='8px';  ring.style.width='36px'; ring.style.height='36px'; ring.style.borderColor='rgba(201,169,110,0.45)'; });
    });

    /* ── Rain ── */
    const canvas = document.getElementById('rain');
    const ctx    = canvas.getContext('2d');
    let drops    = [];

    function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
    resize(); window.addEventListener('resize', resize);

    function initDrops(){
      drops=[];
      const n = Math.floor(innerWidth/7);
      for(let i=0;i<n;i++) drops.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height,
        len: Math.random()*55+15,
        speed: Math.random()*2.5+1.5,
        op: Math.random()*0.22+0.04,
        w: Math.random()*0.5+0.2
      });
    }
    initDrops();

    (function drawRain(){
      ctx.clearRect(0,0,canvas.width,canvas.height);
      drops.forEach(d=>{
        const g = ctx.createLinearGradient(d.x,d.y,d.x,d.y+d.len);
        g.addColorStop(0,`rgba(170,180,220,0)`);
        g.addColorStop(1,`rgba(170,180,220,${d.op})`);
        ctx.strokeStyle=g; ctx.lineWidth=d.w;
        ctx.beginPath(); ctx.moveTo(d.x,d.y); ctx.lineTo(d.x-0.5,d.y+d.len); ctx.stroke();
        d.y+=d.speed;
        if(d.y>canvas.height){ d.y=-d.len; d.x=Math.random()*canvas.width; }
      });
      requestAnimationFrame(drawRain);
    })();

    /* ── Visitor Counter — real API ── */
    (async function(){
      try{
        const sessKey='fuji_v4_seen';
        let endpoint = sessionStorage.getItem(sessKey)
          ? 'https://api.counterapi.dev/v1/wz9efuji/visits'
          : 'https://api.counterapi.dev/v1/wz9efuji/visits/up';
        if(!sessionStorage.getItem(sessKey)) sessionStorage.setItem(sessKey,'1');
        const r = await fetch(endpoint);
        const j = await r.json();
        document.getElementById('visitor-count').textContent = (j.count||0).toLocaleString();
      } catch{ document.getElementById('visitor-count').textContent='—'; }
    })();

    ];

    let cur=0, isLoop=false, isShuffle=false, isDrag=false;

    const audio   = document.getElementById('audio');
    const playBtn = document.getElementById('play-btn');
    const playIco = document.getElementById('play-icon');
    const fill    = document.getElementById('progress-fill');
    const tCur    = document.getElementById('time-cur');
    const tTot    = document.getElementById('time-tot');
    const volEl   = document.getElementById('vol');
    const artEl   = document.getElementById('music-art');
    const listEl  = document.getElementById('track-list');
    const loopBtn = document.getElementById('loop-btn');
    const shufBtn = document.getElementById('shuffle-btn');

    const PSYM = '<polygon points="5 3 19 12 5 21 5 3"/>';
    const PAUSYM= '<rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>';

    const fmt = s => {
      if(!s||isNaN(s)) return '0:00';
      const m=Math.floor(s/60), sc=Math.floor(s%60);
      return m+':'+(sc<10?'0':'')+sc;
    };

    function buildList(){
      listEl.innerHTML='';
      TRACKS.forEach((t,i)=>{
        const el=document.createElement('div');
        el.className='track-item'+(i===cur?' active':'');
        el.innerHTML=`
          <div class="track-num" id="tn${i}">${i===cur?`<div class="eq${audio.paused?' paused':''}"><span></span><span></span><span></span></div>`:(i+1)}</div>
          <img src="${t.cover}" style="width:36px;height:36px;border-radius:8px;object-fit:cover;flex-shrink:0;" />
          <div class="track-name">
            <div class="track-name-main">${t.title}</div>
            <div class="track-name-artist">${t.artist}</div>
          </div>
          <div class="track-dur" id="td${i}">—</div>`;
        el.addEventListener('click',()=>{ load(i); audio.play(); setPlay(true); });
        listEl.appendChild(el);
      });
      // re-attach cursor effects for new track items
      listEl.querySelectorAll('.track-item').forEach(el=>{
        el.addEventListener('mouseenter',()=>{ cursor.style.width='14px'; cursor.style.height='14px'; ring.style.width='50px'; ring.style.height='50px'; ring.style.borderColor='rgba(201,169,110,0.75)'; });
        el.addEventListener('mouseleave',()=>{ cursor.style.width='8px';  cursor.style.height='8px';  ring.style.width='36px'; ring.style.height='36px'; ring.style.borderColor='rgba(201,169,110,0.45)'; });
      });
    }

    function updateList(){
      document.querySelectorAll('.track-item').forEach((el,i)=>{
        el.classList.toggle('active',i===cur);
        const n=document.getElementById(`tn${i}`);
        if(!n) return;
        if(i===cur) n.innerHTML=`<div class="eq${audio.paused?' paused':''}"><span></span><span></span><span></span></div>`;
        else n.textContent=i+1;
      });
    }

    const GLOWS=['rgba(30,60,120,0.45)','rgba(180,60,10,0.45)','rgba(140,10,10,0.45)'];
    function setGlow(color){
      const wrap=document.querySelector('.music-glow-wrap');
      if(wrap) wrap.style.setProperty('--glow-color', color);
    }

    function load(idx){
      cur=idx; const t=TRACKS[idx];
      document.getElementById('track-title').textContent=t.title;
      document.getElementById('track-artist').textContent=t.artist;
      document.getElementById('cover-img').src=t.cover;
      setGlow(GLOWS[idx]||GLOWS[0]);
      audio.src=t.src; audio.load();
      fill.style.width='0%'; tCur.textContent='0:00'; tTot.textContent='0:00';
      buildList();
    }

    function setPlay(p){
      playIco.innerHTML=p?PAUSYM:PSYM;
      artEl.classList.toggle('playing',p);
      const wrap=document.querySelector('.music-glow-wrap');
      if(wrap) wrap.classList.toggle('pulse-glow',p);
      updateList();
    }

    playBtn.addEventListener('click',()=>{ if(audio.paused){audio.play();setPlay(true);}else{audio.pause();setPlay(false);} });

    document.getElementById('next-btn').addEventListener('click',()=>{
      const n=isShuffle?Math.floor(Math.random()*TRACKS.length):(cur+1)%TRACKS.length;
      load(n); audio.play(); setPlay(true);
    });

    document.getElementById('prev-btn').addEventListener('click',()=>{
      if(audio.currentTime>3){audio.currentTime=0;return;}
      const p=isShuffle?Math.floor(Math.random()*TRACKS.length):(cur-1+TRACKS.length)%TRACKS.length;
      load(p); audio.play(); setPlay(true);
    });

    loopBtn.addEventListener('click',()=>{ isLoop=!isLoop; audio.loop=isLoop; loopBtn.classList.toggle('active',isLoop); });
    shufBtn.addEventListener('click',()=>{ isShuffle=!isShuffle; shufBtn.classList.toggle('active',isShuffle); });

    audio.addEventListener('timeupdate',()=>{
      if(!audio.duration||isDrag) return;
      fill.style.width=(audio.currentTime/audio.duration*100)+'%';
      tCur.textContent=fmt(audio.currentTime);
    });

    audio.addEventListener('loadedmetadata',()=>{
      tTot.textContent=fmt(audio.duration);
      const d=document.getElementById(`td${cur}`); if(d) d.textContent=fmt(audio.duration);
    });

    audio.addEventListener('ended',()=>{
      if(isLoop) return;
      const n=isShuffle?Math.floor(Math.random()*TRACKS.length):(cur+1)%TRACKS.length;
      load(n); audio.play(); setPlay(true);
    });

    const pw = document.getElementById('progress-wrap');
    function seek(e){
      if(!audio.duration) return;
      const r=pw.getBoundingClientRect();
      const x=e.touches?e.touches[0].clientX:e.clientX;
      const p=Math.max(0,Math.min(1,(x-r.left)/r.width));
      audio.currentTime=p*audio.duration;
      fill.style.width=(p*100)+'%';
      tCur.textContent=fmt(audio.currentTime);
    }

    pw.addEventListener('mousedown',e=>{isDrag=true;seek(e);});
    pw.addEventListener('touchstart',e=>{isDrag=true;seek(e);},{passive:true});
    document.addEventListener('mousemove',e=>{if(isDrag)seek(e);});
    document.addEventListener('touchmove',e=>{if(isDrag)seek(e);},{passive:true});
    document.addEventListener('mouseup',()=>{isDrag=false;});
    document.addEventListener('touchend',()=>{isDrag=false;});

    volEl.addEventListener('input',()=>{ audio.volume=volEl.value/100; });
    audio.volume=volEl.value/100;
    load(0);

    /* ── Discord Lanyard ── */
    const SC={online:'#22d47a',idle:'#f5c542',dnd:'#f04e4e',offline:'#80848E'};
    const SL={online:'Online',idle:'Idle',dnd:'Do Not Disturb',offline:'Offline'};

    async function loadLanyard(){
      try{
        const r=await fetch('https://api.lanyard.rest/v1/users/1209849017765208114');
        const j=await r.json();
        if(!j.success) throw 0;
        const d=j.data, s=d.discord_status||'offline', c=SC[s]||'#80848E';
        const dot=document.getElementById('dc-dot');
        dot.style.background=c; dot.classList.toggle('online',s==='online');
        document.getElementById('status-pip').style.background=c;
        document.getElementById('status-text').textContent=SL[s]||'Offline';
        document.getElementById('status-text').style.color=c;

        const acts=(d.activities||[]).filter(a=>a.type!==4);
        const cs=(d.activities||[]).find(a=>a.type===4);
        document.getElementById('dc-activity').textContent=
          acts.length?`Playing ${acts[0].name}`:cs?.state||SL[s];

        /* Spotify */
        const sp=d.spotify;
        const spCard=document.getElementById('spotify-card');
        if(sp && sp.song){
          document.getElementById('sp-song').textContent=sp.song;
          document.getElementById('sp-artist').textContent=sp.artist;
          if(sp.album_art_url) document.getElementById('sp-art').src=sp.album_art_url;
          spCard.style.display='flex';
          /* Ambient glow from Spotify album color if no local track playing */
          if(audio.paused) setGlow('rgba(29,185,84,0.4)');
        } else {
          spCard.style.display='none';
        }
      }catch{
        document.getElementById('dc-activity').textContent='Offline';
        document.getElementById('status-text').textContent='Offline';
        ['dc-dot','status-pip'].forEach(id=>document.getElementById(id).style.background='#80848E');
        document.getElementById('spotify-card').style.display='none';
      }
    }

    loadLanyard(); setInterval(loadLanyard,15000);

    /* ── Copy Discord Tag ── */
    function copyTag(){
      navigator.clipboard.writeText('wz9e').then(()=>{
        const btn=document.getElementById('copy-btn');
        btn.textContent='COPIED!';
        btn.style.color='var(--gold)';
        btn.style.borderColor='var(--gold)';
        setTimeout(()=>{ btn.textContent='COPY'; btn.style.color=''; btn.style.borderColor=''; },1800);
      });
    }

    /* ── Click Ripple ── */
    document.addEventListener('click', e=>{
      const r=document.createElement('div');
      r.className='ripple';
      r.style.left=e.clientX+'px';
      r.style.top=e.clientY+'px';
      const size=Math.max(60,Math.random()*80+40)+'px';
      r.style.width=size; r.style.height=size;
      document.body.appendChild(r);
      r.addEventListener('animationend',()=>r.remove());
    });
  </script>
</body>
</html>
